name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: compose/production/django/Dockerfile
          push: true
          tags: |
            ravonzz174/studyfile_django:latest
            ravonzz174/studyfile_django:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Postgres image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: compose/production/postgres/Dockerfile
          push: true
          tags: |
            ravonzz174/studyfile_postgres:latest
            ravonzz174/studyfile_postgres:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max